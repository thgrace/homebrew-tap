name: Update Formulae

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formulae
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/update_formulae.py

      - name: Validate generated formulae
        run: |
          ruby -c Formula/redis-cli.rb
          ruby -c Formula/opengrep.rb
          ruby -c Formula/oss-rebuild.rb

      - name: Commit and push changes
        run: |
          if git diff --quiet -- Formula; then
            echo "No formula changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula
          git commit -m "Update formulae"
          git push origin main
