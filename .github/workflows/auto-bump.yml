name: Auto Bump Redis CLI

on:
  schedule:
    - cron: '0 12 * * *' # daily at noon UTC
  workflow_dispatch: # allow manual trigger
  
permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current formula version
        id: current
        run: echo "version=$(ruby -ne 'puts $1 if /redis-(\d+\.\d+\.\d+)\.tar\.gz/' Formula/redis-cli.rb)" >> "$GITHUB_OUTPUT"

      - name: Get latest Redis release
        id: latest
        run: |
          latest=$(curl -s https://api.github.com/repos/redis/redis/releases/latest | jq -r '.tag_name')
          echo "version=$latest" >> "$GITHUB_OUTPUT"

      - name: Bump formula
        if: steps.current.outputs.version != steps.latest.outputs.version
        run: |
          echo "Bumping from ${{ steps.current.outputs.version }} to ${{ steps.latest.outputs.version }}"
          ./bump ${{ steps.latest.outputs.version }} > Formula/redis-cli.rb

      - name: Commit and push
        if: steps.current.outputs.version != steps.latest.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/redis-cli.rb
          git commit -m "Bump redis-cli to ${{ steps.latest.outputs.version }}"
          git tag "redis-cli-${{ steps.latest.outputs.version }}"
          git push origin main --tags
